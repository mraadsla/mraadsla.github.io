<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mariana da Silva</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      scroll-behavior: smooth;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      height: 100vh;
      background-color: #4F7942;
      color: white;
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .sidebar img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid white;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      margin: 8px 0;
      font-weight: bold;
      opacity: 0.7;
      transition: 0.3s;
    }

    .sidebar a.active {
      opacity: 1;
      border-left: 3px solid white;
      padding-left: 8px;
    }

    .sidebar a:hover {
      opacity: 1;
    }

    /* CONTEÚDO */
    .content {
      margin-left: 270px;
      padding: 40px;
      max-width: 800px;
    }

    section {
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      border-bottom: 2px solid #4F7942;
      padding-bottom: 5px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        flex-direction: row;
        overflow-x: auto;
        justify-content: flex-start;
      }

      .sidebar img {
        display: none;
      }

      .sidebar a {
        margin: 10px;
        white-space: nowrap;
      }

      .content {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <img src="sua-foto.jpg" alt="Foto">

    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#experience">Experience</a>
    <a href="#education">Education</a>
    <a href="#certifications">Certifications</a>
    <a href="#social">Social</a>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <section id="about">
      <h2>About</h2>
      <p>Seu texto aqui...</p>
    </section>

    <section id="skills">
      <h2>Skills</h2>
      <p>Seu conteúdo...</p>
    </section>

    <section id="experience">
      <h2>Experience</h2>
      <p>Seu conteúdo...</p>
    </section>

    <section id="education">
      <h2>Education</h2>
      <p>Seu conteúdo...</p>
    </section>

    <section id="certifications">
      <h2>Certifications</h2>
      <p>Seu conteúdo...</p>
    </section>

    <section id="social">
      <h2>Social</h2>
      <p>Seu conteúdo...</p>
    </section>

  </div>

  <!-- JS -->
  <script>
    const sections = document.querySelectorAll("section");
    const navLinks = document.querySelectorAll(".sidebar a");

    window.addEventListener("scroll", () => {
      let current = "";

      sections.forEach(section => {
        const sectionTop = section.offsetTop - 150;
        if (pageYOffset >= sectionTop) {
          current = section.getAttribute("id");
        }
      });

      navLinks.forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + current) {
          link.classList.add("active");
        }
      });

      // fade-in
      sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
          section.classList.add("show");
        }
      });
    });
  </script>

</body>
</html>
